spring:
  application:
    name: MovieDate

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.122.128:5432/movie_date?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: ${DB_PASSWORD:123456789}

  jackson:
    default-property-inclusion: non_null  # JSON 序列化时忽略 null 值

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.fizzy.moviedate.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# TMDB 配置
tmdb:
  api:
    base-url: https://api.themoviedb.org/3
    key: ${TMDB_API_KEY:your_api_key_here}  # v3 API Key
    image-base-url: https://image.tmdb.org/t/p/w500
    read-timeout: 10000
    connect-timeout: 10000

# 日志
logging:
  level:
    org.fizzy.moviedate: DEBUG
    org.springframework.web.client: DEBUG
